modLoader="javafml"
loaderVersion="${loader_version_range}"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"

description='''
Wind simulation addon for Simulated Project / Create Aeronautics.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="create"
type="required"
versionRange="[6.0.10,6.1.0)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="sable"
type="required"
versionRange="[1.2.1,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="simulated"
type="required"
versionRange="[1.2.1,)"
ordering="AFTER"
side="BOTH"

[[mixins]]
config="aero_wind.mixins.json"